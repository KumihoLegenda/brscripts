<!DOCTYPE html>
<html>
<head>
    <title>Список IP-адресов с копированием</title>
    <meta charset="UTF-8">
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .ip-item { margin-bottom: 10px; display: flex; align-items: center; gap: 10px; }
        .ip-address { font-family: monospace; font-size: 16px; background: #f0f0f0; padding: 5px 10px; border-radius: 4px; }
        button { padding: 5px 12px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; }
        button:hover { background: #0056b3; }
        .message { margin-left: 10px; color: green; font-size: 14px; }
    </style>
</head>
<body>

<h3>Уникальные IP-адреса (нажмите «Скопировать» рядом с нужным)</h3>

<div id="ip-list"></div>

<script>
    const ipAddresses = [
        "190.153.102.2",
        "190.153.113.75",
        "186.79.87.87",
        "189.203.148.57",
        "190.20.198.237",
        "190.99.215.219",
        "45.180.207.128",
        "211.226.50.198",
        "221.168.247.97",
        "186.169.66.198",
        "187.105.98.234",
        "152.173.75.88",
        "191.80.227.160",
        "174.95.220.215",
        "200.113.196.77",
        "181.211.216.186",
        "186.78.130.197",
        "186.14.124.209",
        "45.183.62.168",
        "131.255.62.140",
        "1.239.209.71",
        "211.195.248.39",
        "187.226.172.210",
        "186.170.115.70",
        "187.19.255.152",
        "46.110.53.146",
        "200.6.182.115",
        "187.145.112.236",
        "27.242.158.26",
        "114.44.50.40",
        "138.84.39.116",
        "187.64.24.245"
    ];

    const container = document.getElementById('ip-list');

    ipAddresses.forEach(ip => {
        const div = document.createElement('div');
        div.className = 'ip-item';

        const span = document.createElement('span');
        span.className = 'ip-address';
        span.textContent = ip;

        const button = document.createElement('button');
        button.textContent = 'Скопировать';
        button.onclick = () => {
            navigator.clipboard.writeText(ip).then(() => {
                const msg = document.createElement('span');
                msg.className = 'message';
                msg.textContent = '✓ скопировано';
                div.appendChild(msg);
                setTimeout(() => msg.remove(), 1500);
            });
        };

        div.appendChild(span);
        div.appendChild(button);
        container.appendChild(div);
    });
</script>

</body>
</html>
